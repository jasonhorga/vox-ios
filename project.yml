name: VoxInput
options:
  # NOTE: bundleIdPrefix is intentionally omitted.
  # All bundle identifiers are explicitly set via PRODUCT_BUNDLE_IDENTIFIER
  # to avoid XcodeGen auto-generating IDs that conflict with embedding validation.
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: false
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: "6HB84897DJ"

targets:
  VoxInput:
    type: application
    platform: iOS
    sources:
      - path: VoxInput
        excludes:
          - "**/.DS_Store"
          - "Info.plist"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    resources:
      - path: VoxInput/Assets.xcassets
      - path: VoxInput/Resources/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jasonhorga.vox
        ENABLE_TESTABILITY: true
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: VoxInput/VoxInput.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "match AppStore com.jasonhorga.vox"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: true
    info:
      path: VoxInput/Info.plist
      properties:
        CFBundleName: "Vox Input"
        CFBundleDisplayName: "Vox Input"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundlePackageType: "$(PRODUCT_TYPE)"
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleIconName: AppIcon
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: "Vox Input 需要使用麦克风进行语音输入"
        NSSpeechRecognitionUsageDescription: "Vox Input 在离线时使用本地语音识别将语音转为文字"
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: VoxInput/VoxInput.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jasonhorga.vox
        keychain-access-groups:
          - "$(AppIdentifierPrefix)com.jasonhorga.vox.shared"
    dependencies:
      - target: VoxInputKeyboard

  VoxInputTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VoxInputTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: VoxInput
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jasonhorga.vox.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/VoxInput.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/VoxInput"
        BUNDLE_LOADER: "$(TEST_HOST)"

  VoxInputKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: VoxInputKeyboard
        excludes:
          - "**/.DS_Store"
          - "Info.plist"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jasonhorga.vox.keyboard
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: VoxInputKeyboard/VoxInputKeyboard.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "match AppStore com.jasonhorga.vox.keyboard"
        SKIP_INSTALL: true
    info:
      path: VoxInputKeyboard/Info.plist
      properties:
        CFBundleName: "VoxInputKeyboard"
        CFBundleDisplayName: "Vox Keyboard"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundlePackageType: "$(PRODUCT_TYPE)"
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: "zh-Hans"
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: "com.apple.keyboard-service"
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).KeyboardViewController"
        NSMicrophoneUsageDescription: "Vox Input 需要使用麦克风进行语音输入"
        NSSpeechRecognitionUsageDescription: "Vox Input 在离线时使用本地语音识别将语音转为文字"
    entitlements:
      path: VoxInputKeyboard/VoxInputKeyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jasonhorga.vox
        keychain-access-groups:
          - "$(AppIdentifierPrefix)com.jasonhorga.vox.shared"
        com.apple.security.network.client: true

schemes:
  VoxInput:
    build:
      targets:
        VoxInput: all
        VoxInputTests: [test]
    test:
      targets:
        - VoxInputTests

  VoxInputTests:
    build:
      targets:
        VoxInput: all
        VoxInputTests: [test]
    test:
      targets:
        - VoxInputTests
      gatherCoverageData: true
