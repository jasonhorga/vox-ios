included:
  - VoxInput
  - VoxInputKeyboard
  - Shared

excluded:
  - .build
  - DerivedData

disabled_rules:
  - trailing_whitespace

opt_in_rules:
  - empty_count
  - force_unwrapping

line_length:
  warning: 140
  error: 200

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800
