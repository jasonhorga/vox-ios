name: CD — TestFlight

on:
  push:
    tags:
      - 'v*'          # Triggered by version tags (e.g. v1.0.0)
  workflow_dispatch:   # Manual trigger from GitHub UI
    inputs:
      notes:
        description: 'Release notes for this build'
        required: false
        default: 'Manual build'

concurrency:
  group: cd-testflight
  cancel-in-progress: false   # Don't cancel in-flight uploads

jobs:
  deploy:
    name: Build & Deploy to TestFlight
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select stable Xcode 16.2
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app
          xcode-select -p
          xcodebuild -version

      - name: Show Xcode / SDK diagnostics (runner default)
        run: |
          echo "DEVELOPER_DIR=${DEVELOPER_DIR:-<not-set>}"
          xcode-select -p
          xcodebuild -version
          xcodebuild -showsdks

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true    # Caches gems based on Gemfile.lock

      - name: Validate signing reuse secrets
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_KEYCHAIN_PASSWORD: ${{ secrets.MATCH_KEYCHAIN_PASSWORD }}
        run: |
          test -n "$MATCH_GIT_URL" || (echo "❌ Missing MATCH_GIT_URL" && exit 1)
          test -n "$MATCH_PASSWORD" || (echo "❌ Missing MATCH_PASSWORD" && exit 1)
          test -n "$MATCH_KEYCHAIN_PASSWORD" || (echo "❌ Missing MATCH_KEYCHAIN_PASSWORD" && exit 1)
          echo "✅ match secrets are present (reuse mode)"

      - name: Run Fastlane Beta
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_KEYCHAIN_PASSWORD: ${{ secrets.MATCH_KEYCHAIN_PASSWORD }}
        run: bundle exec fastlane beta

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VoxInput-${{ github.ref_name }}
          path: build/VoxInput.ipa
          retention-days: 30
