name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Verify
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate .xcodeproj
        run: xcodegen generate

      - name: Build Main App (no signing)
        run: |
          xcodebuild build \
            -project VoxInput.xcodeproj \
            -scheme VoxInput \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true

      - name: Build Keyboard Extension (no signing)
        run: |
          xcodebuild build \
            -project VoxInput.xcodeproj \
            -scheme VoxInputKeyboard \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true

      - name: Swift Package Resolve (if needed)
        run: |
          if [ -f Package.swift ]; then
            swift package resolve
          fi

  test:
    name: Unit Tests
    runs-on: macos-15
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate .xcodeproj
        run: xcodegen generate

      - name: Run Unit Tests
        run: |
          set -o pipefail
          SIM=$(xcrun simctl list devices available -j | python3 -c "
import sys, json
d = json.load(sys.stdin)
for runtime in sorted(d['devices'].keys(), reverse=True):
    if 'iOS' in runtime:
        for dev in d['devices'][runtime]:
            if 'iPhone' in dev['name'] and dev['isAvailable']:
                print(dev['udid'])
                exit()
")
          echo "Using simulator: $SIM"
          xcodebuild test \
            -project VoxInput.xcodeproj \
            -scheme VoxInput \
            -destination "platform=iOS Simulator,id=$SIM" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color --report junit

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/junit.xml

  lint:
    name: Swift Lint
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging || true
