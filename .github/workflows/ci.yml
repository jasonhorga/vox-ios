name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install tools
        run: |
          brew install xcodegen
          gem install xcpretty --no-document

      - name: Generate .xcodeproj
        run: xcodegen generate

      - name: Build Main App
        run: |
          set -o pipefail
          xcodebuild build \
            -project VoxInput.xcodeproj \
            -scheme VoxInput \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | xcpretty

      - name: Build Keyboard Extension
        run: |
          set -o pipefail
          xcodebuild build \
            -project VoxInput.xcodeproj \
            -scheme VoxInputKeyboard \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | xcpretty

      - name: Find Simulator
        run: |
          cat << 'EOF' > find_sim.py
          import sys,json
          d=json.load(sys.stdin)
          found=''
          for runtime in sorted(d['devices'].keys(), reverse=True):
            if 'iOS' in runtime:
              for dev in d['devices'][runtime]:
                if 'iPhone' in dev['name'] and dev.get('isAvailable'):
                  found=dev['udid']
                  break
              if found: break
          print(found)
          EOF
          SIM=$(xcrun simctl list devices available -j | python3 find_sim.py)
          echo "SIMULATOR_UDID=$SIM" >> $GITHUB_ENV
          echo "Using: $SIM"

      - name: Run Unit Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project VoxInput.xcodeproj \
            -scheme VoxInputTests \
            -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | xcpretty --color --report junit

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/junit.xml

  lint:
    name: Swift Lint
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging || true
